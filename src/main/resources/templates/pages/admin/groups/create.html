<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layout/admin :: layout(~{::section})}">

<section th:fragment="group-index-create"
	class="section__content section__content--p30">


	<div class="container-fluid">
		<div class="page-header">
			<div>
				<h1>Group</h1>
			
			</div>
			<div class="page-header__actions">
				<a th:href="@{/admin/group}" class="m-btn m-btn--primary">
					<i class="fa-solid fa-arrow-left"></i>Groups
				</a>
				
			</div>
		</div>

		<section>
			<div class="col-lg-12">
				<div class="card">
					<div class="card-header">
						<strong>Group Create Form</strong>
					</div>
					<div class="card-body card-body">
						<form action="#" method="post" onsubmit="return false"
							enctype="multipart/form-data" class="form-horizontal">

							<div class="row mb-3">
								<div class="col col-md-3">
									<label for="text-input" class="form-control-label">Group
										Name *</label>
								</div>
								<div class="col-12 col-md-9">
									<input type="text" id="text-input" name="text-input"
										placeholder="Group Name" class="form-control"> 
										<!-- <small class="form-text text-muted">This is a help text</small> -->
								</div>
							</div>
							<div class="card-footer">
								<button type="submit" class="btn btn-primary btn-sm">
									<i class="fa-regular fa-dot-circle"></i> Submit
								</button>
								<button type="reset" class="btn btn-danger btn-sm">
									<i class="fa-solid fa-ban"></i> Reset
								</button>
							</div>
					</div>
					</form>
				</div>


			</div>
		</section>



	</div>

</section>
</html>
